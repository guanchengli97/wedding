type RSVP @model @auth(rules: [{allow: public, provider: apiKey, operations: [create]},
  {allow: groups, groups: ["ADMINS"]}])
{
  fullName: String!
  email: String
  phone: String
  guestCount: Int!
  attending: Boolean!
  arrivalInfo: String
  songRequest: String
  message: String
  language: String!
}

type GuestPhoto @model @auth(rules: [{allow: public, provider: apiKey, operations: [create, read]},
  {allow: groups, groups: ["ADMINS"]}])
{
  storagePath: String
  originalFileName: String
  uploaderName: String
  message: String
}