type RSVP @model @auth(rules: [{allow: public, provider: apiKey, operations: [create]},
  {allow: groups, operations: [read], groups: ["ADMINS"]}])
{
  fullName: String!
  email: String
  phone: String
  guestCount: Int!
  attending: Boolean!
  arrivalInfo: String
  songRequest: String
  message: String
  language: String!
}